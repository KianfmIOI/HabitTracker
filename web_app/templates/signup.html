{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">✅</div>
      <h2>Create Account</h2>
      <p>Start tracking your habits today</p>
    </div>

    <form method="post" action="{{ url_for('signup') }}" class="auth-form">

      <div class="auth-field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required />
      </div>

      <div class="auth-field">
        <label for="birth_date">Date of Birth</label>
        <input type="date" id="birth_date" name="birth_date" />
      </div>

      <div class="auth-field">
        <label for="phone_number">Phone Number</label>
        <input type="tel" id="phone_number" name="phone_number" placeholder="e.g. 09123456789" required
          maxlength="11" />
      </div>

      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 10 characters" required minlength="10" />
      </div>

      <button type="submit" class="auth-submit-btn">Sign Up</button>

    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="{{ url_for('login') }}">Log in here</a>
    </div>

  </div>
</div>

{% endblock %}
