{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">🔑</div>
      <h2>Welcome Back</h2>
      <p>Log in to continue your habit journey</p>
    </div>

    <form method="post" action="{{ url_for('login') }}" class="auth-form">

      <div class="auth-field">
        <label for="phone_number">Phone Number</label>
        <input type="tel" id="phone_number" name="phone_number" placeholder="e.g. 09123456789" required
          maxlength="11" />
      </div>

      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required minlength="10" />
      </div>

      <button type="submit" class="auth-submit-btn">Log In</button>

    </form>

    <div class="auth-footer">
      Not a user yet?
      <a href="{{ url_for('signup') }}">Sign up here</a>
    </div>

  </div>
</div>

{% endblock %}
