<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habit Tracker</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet" /> -->
  <!-- <script src="https://unpkg.com/htmx.org@1.9.12"></script> -->

</head>

<body>
  <div class="confirm-modal hidden" id="confirm-modal">
    <div class="confirm-modal-content">
      <h2 id="confirm-modal-title">Confirm</h2>
      <p id="confirm-modal-message">Are you sure?</p>
      <div class="confirm-modal-actions">
        <button type="button" id="confirm-modal-cancel">Cancel</button>
        <button type="button" id="confirm-modal-ok" class="danger">OK</button>
      </div>
    </div>
  </div>

  <main class="container px-4">
    <h1>Kian's Habit Tracker</h1>

    <!-- Navigation Box -->
    {% block nav %}{% endblock %}
    <!--flask flash-->
    <div class="flash-container">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
      {% include "partials/_flash_message.html" %}
      {% endfor %}
      {% endwith %}
    </div>

    <!-- Layout Wrapper for Sidebar + Main Content -->
    {% block content %} {% endblock %}
  </main>

  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
  <script src="{{url_for('static', filename='app.js')}}"></script>
  <script src="{{url_for('static', filename='htmx.min.js')}}"></script>
</body>

</html>
