<!-- Profile Edit Modal -->
<div id="editProfileModal" class="modal">
    <div class="modal-content">
        <h3>Edit Profile</h3>
        <form id="editProfileForm" method="POST">
            <label class="form-label">Name:</label>
            <input class="form-control" type="text" name="name" id="editProfileName" placeholder="Your name" />

            <label class="form-label">Username:</label>
            <input class="form-control" type="text" name="username" id="editProfileUsername" placeholder="Your username"
                required />

            <label class="form-label">Email:</label>
            <input class="form-control" type="email" name="email" id="editProfileEmail" placeholder="Your Email" />

            <label class="form-label">Phone Number:</label>
            <input class="form-control" type="tel" name="phone_number" id="editProfilePhone"
                placeholder="e.g. 09123456789" maxlength="11" />

            <label class="form-label">Date of Birth:</label>
            <input class="form-control" type="date" name="birth_date" id="editProfileBirthday" />

            <label class="form-label">Password (leave blank to keep current):</label>
            <input class="form-control" type="password" name="password" id="editProfilePassword"
                placeholder="Min. 10 characters" minlength="10" />

            <button type="submit">Save Changes</button>
            <button type="button" onclick="closeProfileModal()">Cancel</button>
        </form>
    </div>
</div>
