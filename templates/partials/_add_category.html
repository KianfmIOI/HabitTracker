<section class="">
  <h2>Add Category</h2>
  <form method="post" action="{{ url_for('add_category_route') }}">
    <label for="habit_name">Title: </label>
    <br />
    <input type="text" name="Category-title" style="width: 35%" placeholder="Name" required />
    <br />

    <button type="submit">Add</button>
  </form>

  <!-- List of existing categories -->
  <div style="margin-top: 20px; list-style-type: none; padding-left: 0;">
    <h3>Existing Categories:</h3>
    {% if categories %}
    <ul>
      {% for category in categories %}
      <li style="padding: 5px 0; border-bottom: 1px solid #eee;">
        {{ category.title }}
        <!-- later: edit/delete buttons -->
        <!-- <a href="">Edit</a> -->
        <!-- <a href="">Delete</a> -->
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p>No categories yet. Add one above!</p>
    {% endif %}
  </div>
</section>
